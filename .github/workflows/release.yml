name: Release

on:
  push:
    tags:
      # Match clean semver tags only: 0.3.4, 1.0.0, etc.
      # NOT vX.Y.Z, NOT back-X.Y.Z — HACS rejects those.
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MANIFEST_VERSION=$(jq -r '.version' custom_components/rover/manifest.json)
          INIT_VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' custom_components/rover/__init__.py)

          echo "Tag:      $TAG"
          echo "Manifest: $MANIFEST_VERSION"
          echo "Init:     $INIT_VERSION"

          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $TAG does not match manifest.json version $MANIFEST_VERSION"
            exit 1
          fi
          if [ "$TAG" != "$INIT_VERSION" ]; then
            echo "::error::Tag $TAG does not match __init__.py __version__ $INIT_VERSION"
            exit 1
          fi

      - name: Build rover.zip
        run: |
          # ZIP must contain files at root, not under rover/ — HACS would
          # otherwise create custom_components/rover/rover/ on install.
          cd custom_components/rover
          zip -r ../../rover.zip . -x "__pycache__/*" "*.pyc" "tests/*"
          cd ../..
          echo "--- ZIP contents ---"
          unzip -l rover.zip | head -30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "v$TAG" \
            --generate-notes \
            rover.zip
